name: Cleanup Stale Release Refs

on:
    workflow_dispatch:
        inputs:
            days:
                description: "Delete refs not updated for how many days"
                required: true
                default: "30"
            dry_run:
                description: "If true, only print candidates without deleting"
                required: true
                default: "false"
                type: choice
                options:
                    - "true"
                    - "false"
    schedule:
        - cron: "0 3 * * 0"

permissions:
    contents: write

jobs:
    cleanup-stale-release-refs:
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ github.token }}
            DAYS: ${{ github.event.inputs.days || '30' }}
            DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        steps:
            - name: Delete stale release-related branches and tags
              shell: bash
              run: |
                  set -euo pipefail

                  REPO="$GITHUB_REPOSITORY"
                  DAYS_NUM="$DAYS"
                  DRY="$DRY_RUN"

                  if ! [[ "$DAYS_NUM" =~ ^[0-9]+$ ]]; then
                    echo "Invalid DAYS input: $DAYS_NUM"
                    exit 1
                  fi

                  CUTOFF_EPOCH=$(date -u -d "$DAYS_NUM days ago" +%s)
                  CUTOFF_ISO=$(date -u -d "@$CUTOFF_EPOCH" +%Y-%m-%dT%H:%M:%SZ)

                  echo "Repository: $REPO"
                  echo "Cutoff: $CUTOFF_ISO (older than this is stale)"
                  echo "Dry run: $DRY"

                  echo "## Cleanup Stale Release Refs" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Cutoff days: $DAYS_NUM" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Cutoff time (UTC): $CUTOFF_ISO" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Dry run: $DRY" >> "$GITHUB_STEP_SUMMARY"

                  RELEASES_JSON=$(gh api --paginate "repos/$REPO/releases?per_page=100" | jq -s 'add')

                  RELEASE_COUNT=$(printf '%s' "$RELEASES_JSON" | jq 'length')
                  echo "Found releases: $RELEASE_COUNT"
                  echo "- Releases scanned: $RELEASE_COUNT" >> "$GITHUB_STEP_SUMMARY"

                  mapfile -t RELEASE_TAGS < <(printf '%s' "$RELEASES_JSON" | jq -r '.[].tag_name | select(length > 0)' | sort -u)
                  mapfile -t RELEASE_BRANCHES < <(printf '%s' "$RELEASES_JSON" | jq -r '.[].target_commitish | select(length > 0) | select(test("^[0-9a-fA-F]{40}$") | not)' | sort -u)

                  DELETED_BRANCHES=()
                  SKIPPED_BRANCHES=()
                  MISSING_BRANCHES=()

                  encode_uri() {
                    jq -nr --arg v "$1" '$v|@uri'
                  }

                  branch_commit_epoch() {
                    local branch="$1"
                    local enc
                    enc=$(encode_uri "$branch")
                    gh api "repos/$REPO/commits/$enc" --jq '.commit.committer.date' | xargs -I{} date -u -d "{}" +%s
                  }

                  branch_exists() {
                    local branch="$1"
                    local enc
                    enc=$(encode_uri "$branch")
                    gh api "repos/$REPO/branches/$enc" >/dev/null 2>&1
                  }

                  delete_branch() {
                    local branch="$1"
                    local enc
                    enc=$(encode_uri "$branch")
                    gh api -X DELETE "repos/$REPO/git/refs/heads/$enc" >/dev/null
                  }

                  for branch in "${RELEASE_BRANCHES[@]:-}"; do
                    [ -z "$branch" ] && continue

                    if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
                      SKIPPED_BRANCHES+=("$branch (protected)")
                      continue
                    fi

                    if ! branch_exists "$branch"; then
                      MISSING_BRANCHES+=("$branch")
                      continue
                    fi

                    BR_EPOCH=$(branch_commit_epoch "$branch")
                    if [ "$BR_EPOCH" -lt "$CUTOFF_EPOCH" ]; then
                      if [ "$DRY" = "true" ]; then
                        DELETED_BRANCHES+=("$branch (dry-run)")
                      else
                        delete_branch "$branch"
                        DELETED_BRANCHES+=("$branch")
                      fi
                    else
                      SKIPPED_BRANCHES+=("$branch (recent)")
                    fi
                  done

                  DELETED_TAGS=()
                  SKIPPED_TAGS=()
                  MISSING_TAGS=()

                  tag_exists() {
                    local tag="$1"
                    local enc
                    enc=$(encode_uri "$tag")
                    gh api "repos/$REPO/git/ref/tags/$enc" >/dev/null 2>&1
                  }

                  tag_commit_epoch() {
                    local tag="$1"
                    local enc
                    enc=$(encode_uri "$tag")
                    gh api "repos/$REPO/commits/$enc" --jq '.commit.committer.date' | xargs -I{} date -u -d "{}" +%s
                  }

                  delete_tag() {
                    local tag="$1"
                    local enc
                    enc=$(encode_uri "$tag")
                    gh api -X DELETE "repos/$REPO/git/refs/tags/$enc" >/dev/null
                  }

                  for tag in "${RELEASE_TAGS[@]:-}"; do
                    [ -z "$tag" ] && continue

                    if ! tag_exists "$tag"; then
                      MISSING_TAGS+=("$tag")
                      continue
                    fi

                    TG_EPOCH=$(tag_commit_epoch "$tag")
                    if [ "$TG_EPOCH" -lt "$CUTOFF_EPOCH" ]; then
                      if [ "$DRY" = "true" ]; then
                        DELETED_TAGS+=("$tag (dry-run)")
                      else
                        delete_tag "$tag"
                        DELETED_TAGS+=("$tag")
                      fi
                    else
                      SKIPPED_TAGS+=("$tag (recent)")
                    fi
                  done

                  echo "- Branches deleted/candidates: ${#DELETED_BRANCHES[@]}" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Branches skipped: ${#SKIPPED_BRANCHES[@]}" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Branches missing: ${#MISSING_BRANCHES[@]}" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Tags deleted/candidates: ${#DELETED_TAGS[@]}" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Tags skipped: ${#SKIPPED_TAGS[@]}" >> "$GITHUB_STEP_SUMMARY"
                  echo "- Tags missing: ${#MISSING_TAGS[@]}" >> "$GITHUB_STEP_SUMMARY"

                  {
                    echo "### Branches deleted/candidates"
                    if [ "${#DELETED_BRANCHES[@]}" -eq 0 ]; then echo "- (none)"; else printf -- '- %s\n' "${DELETED_BRANCHES[@]}"; fi
                    echo "### Branches skipped"
                    if [ "${#SKIPPED_BRANCHES[@]}" -eq 0 ]; then echo "- (none)"; else printf -- '- %s\n' "${SKIPPED_BRANCHES[@]}"; fi
                    echo "### Branches missing"
                    if [ "${#MISSING_BRANCHES[@]}" -eq 0 ]; then echo "- (none)"; else printf -- '- %s\n' "${MISSING_BRANCHES[@]}"; fi
                    echo "### Tags deleted/candidates"
                    if [ "${#DELETED_TAGS[@]}" -eq 0 ]; then echo "- (none)"; else printf -- '- %s\n' "${DELETED_TAGS[@]}"; fi
                    echo "### Tags skipped"
                    if [ "${#SKIPPED_TAGS[@]}" -eq 0 ]; then echo "- (none)"; else printf -- '- %s\n' "${SKIPPED_TAGS[@]}"; fi
                    echo "### Tags missing"
                    if [ "${#MISSING_TAGS[@]}" -eq 0 ]; then echo "- (none)"; else printf -- '- %s\n' "${MISSING_TAGS[@]}"; fi
                  } >> "$GITHUB_STEP_SUMMARY"
