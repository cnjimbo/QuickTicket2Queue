name: CI
# test
on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ${{ matrix.os }}

    timeout-minutes: 40

    strategy:
      matrix:
        node_version: [24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Set node version to ${{ matrix.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: pnpm

      - name: Install
        run: pnpm i

      - name: Build
        env:
          ELECTRON_BUILDER_PUBLISH: never
        run: pnpm run build

  auto_tag_release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect version increase
        id: version_check
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREVIOUS_VERSION=""

          if [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            PREVIOUS_VERSION=$(git show "$BEFORE_SHA:package.json" 2>/dev/null | node -e "
              const fs = require('node:fs');
              const raw = fs.readFileSync(0, 'utf8');
              if (!raw.trim()) process.exit(0);
              const pkg = JSON.parse(raw);
              process.stdout.write(pkg.version || '');
            ")
          fi

          SHOULD_TAG=$(node -e "
            const current = process.argv[1] || '';
            const previous = process.argv[2] || '';
            if (!current || !previous) {
              process.stdout.write('false');
              process.exit(0);
            }

            const parse = (v) => {
              const m = v.match(/^(\\d+)\\.(\\d+)\\.(\\d+)/);
              return m ? [Number(m[1]), Number(m[2]), Number(m[3])] : null;
            };

            const c = parse(current);
            const p = parse(previous);
            if (!c || !p) {
              process.stdout.write('false');
              process.exit(0);
            }

            const increased = c[0] > p[0] || (c[0] === p[0] && (c[1] > p[1] || (c[1] === p[1] && c[2] > p[2])));
            process.stdout.write(increased ? 'true' : 'false');
          " "$CURRENT_VERSION" "$PREVIOUS_VERSION")

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_tag=$SHOULD_TAG" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        id: create_tag
        if: steps.version_check.outputs.should_tag == 'true'
        env:
          TAG_NAME: ${{ steps.version_check.outputs.tag_name }}
        run: |
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME" "$GITHUB_SHA"
          git push origin "$TAG_NAME"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.create_tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_check.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 90
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    permissions: write-all

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install
        run: pnpm i

      - name: Build x64
        env:
          ELECTRON_BUILDER_PUBLISH: always
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run build
