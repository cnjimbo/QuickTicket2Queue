name: CI
# test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto_tag_release:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      current_version: ${{ steps.version_check.outputs.current_version }}
      tag_name: ${{ steps.version_check.outputs.tag_name }}
      should_tag: ${{ steps.version_check.outputs.should_tag }}
      created: ${{ steps.create_tag.outputs.created }}
      released: ${{ steps.release_status.outputs.released }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect version increase
        id: version_check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="v$CURRENT_VERSION"

          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            SHOULD_TAG="false"
          else
            SHOULD_TAG="true"
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_tag=$SHOULD_TAG" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        id: create_tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.version_check.outputs.should_tag == 'true'
        env:
          TAG_NAME: ${{ steps.version_check.outputs.tag_name }}
        run: |
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME" "$GITHUB_SHA"
          git push origin "$TAG_NAME"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        id: create_release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.create_tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_check.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark release creation result
        id: release_status
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.create_tag.outputs.created == 'true'
        run: echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Report auto tag decision
        if: github.event_name == 'pull_request'
        run: |
          echo "current_version=${{ steps.version_check.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "tag_name=${{ steps.version_check.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "should_tag=${{ steps.version_check.outputs.should_tag }}" >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: auto_tag_release
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.auto_tag_release.outputs.released == 'true'
    timeout-minutes: 90
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    permissions: write-all

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install
        run: pnpm i

      - name: Build and publish
        env:
          ELECTRON_BUILDER_PUBLISH: always
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ needs.auto_tag_release.outputs.tag_name }}
          GITHUB_REF: refs/tags/${{ needs.auto_tag_release.outputs.tag_name }}
        run: pnpm run build
