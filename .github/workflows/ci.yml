name: CI
# test
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_branch:
        description: "Manual input: branch name to release from (example: main or release/26.3.4)"
        required: true
      publish_commit:
        description: "Manual input (optional): commit SHA; find via `git log --oneline -n 20` or GitHub commit page"
        required: false
        default: ""
      force_release:
        description: "Force release for non-alpha/beta versions (stable/rc)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-branch-${{ github.event.inputs.publish_branch || github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  read_package_version:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.read_package_version.outputs.current_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.publish_commit || github.event.inputs.publish_branch || github.sha }}

      - name: Read package version
        id: read_package_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

  prepare_release_metadata:
    needs: read_package_version
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-version-${{ needs.read_package_version.outputs.current_version }}-prepare_release_metadata
      cancel-in-progress: true
    permissions:
      contents: write
    outputs:
      branch_name: ${{ steps.version_check.outputs.branch_name }}
      target_branch: ${{ steps.version_check.outputs.target_branch }}
      target_sha: ${{ steps.version_check.outputs.target_sha }}
      current_version: ${{ steps.version_check.outputs.current_version }}
      release_version: ${{ steps.version_check.outputs.release_version }}
      release_enabled: ${{ steps.version_check.outputs.release_enabled }}
      validation_status: ${{ steps.version_check.outputs.validation_status }}
      tag_name: ${{ steps.version_check.outputs.tag_name }}
      publish_tag_name: ${{ steps.version_check.outputs.publish_tag_name }}
      publish_tag_prefix: ${{ steps.version_check.outputs.publish_tag_prefix }}
      should_tag: ${{ steps.version_check.outputs.should_tag }}
      skip_reason: ${{ steps.version_check.outputs.skip_reason }}
      policy_error: ${{ steps.version_check.outputs.policy_error }}
      prerelease: ${{ steps.version_check.outputs.prerelease }}
      release_type: ${{ steps.version_check.outputs.release_type }}
      overwrite: ${{ steps.version_check.outputs.overwrite }}
      created: ${{ steps.ensure_publish_tag.outputs.created }}
      released: ${{ steps.mark_draft_release_created.outputs.released }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.publish_commit || github.event.inputs.publish_branch || github.sha }}

      - name: Validate branch/version and prepare release metadata
        id: version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_VERSION: ${{ needs.read_package_version.outputs.current_version }}
          FORCE_RELEASE: ${{ github.event.inputs.force_release || 'false' }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          DISPATCH_BRANCH: ${{ github.event.inputs.publish_branch || '' }}
          DISPATCH_COMMIT: ${{ github.event.inputs.publish_commit || '' }}
        run: |
          echo "[信息] 正在根据 package.json 版本号和当前分支判断发布策略"

          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          TARGET_BRANCH="$BRANCH_NAME"
          TARGET_SHA=$(git rev-parse HEAD)

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$DISPATCH_BRANCH" ]; then
              echo "Error: publish_branch is required for workflow_dispatch"
              exit 1
            fi

            TARGET_BRANCH="$DISPATCH_BRANCH"
            BRANCH_NAME="$DISPATCH_BRANCH"

            if [ -n "$DISPATCH_COMMIT" ]; then
              if ! git rev-parse "$DISPATCH_COMMIT^{commit}" >/dev/null 2>&1; then
                echo "Error: publish_commit is not a valid commit: $DISPATCH_COMMIT"
                exit 1
              fi
              TARGET_SHA=$(git rev-parse "$DISPATCH_COMMIT^{commit}")
            fi
          fi

          SHORT_SHA=$(printf '%s' "$TARGET_SHA" | cut -c1-7)
          RELEASE_VERSION="$CURRENT_VERSION"
          SKIP_REASON=""
          RELEASE_TYPE="none"
          TAG_NAME="v$RELEASE_VERSION"
          PUBLISH_TAG_NAME="$TAG_NAME"
          PUBLISH_TAG_PREFIX="v"
          SHOULD_TAG="false"
          OVERWRITE="false"
          PRERELEASE="false"
          RELEASE_CHANNEL="stable"
          VALIDATION_STATUS="skipped"
          RELEASE_ENABLED="false"
          POLICY_ERROR=""
          FORCE_BY_COMMIT="false"
          SKIP_BY_COMMIT="false"

          # Commit message controls (push only):
          # - [ci:release]      => force release
          # - [ci:skip-release] => skip release
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ -n "$COMMIT_MESSAGE" ]; then
            if printf '%s' "$COMMIT_MESSAGE" | grep -Eqi '\[ci:release\]'; then
              FORCE_BY_COMMIT="true"
            fi
            if printf '%s' "$COMMIT_MESSAGE" | grep -Eqi '\[ci:skip-release\]'; then
              SKIP_BY_COMMIT="true"
            fi
          fi

          if printf '%s' "$CURRENT_VERSION" | grep -Eq -- '-[A-Za-z]+\.[0-9]+$'; then
            RELEASE_CHANNEL=$(printf '%s' "$CURRENT_VERSION" | sed -E 's/^.*-([A-Za-z]+)\.[0-9]+$/\1/' | tr '[:upper:]' '[:lower:]')
          fi

          set +e
          VALIDATION_OUTPUT=$(VALIDATION_OUTPUT_FORMAT=github BRANCH_NAME_OVERRIDE="$BRANCH_NAME" APP_VERSION_OVERRIDE="$CURRENT_VERSION" npx --yes tsx .husky/scripts/validate-branch-version-policy.ts 2>&1)
          VALIDATION_EXIT=$?
          set -e

          if [ "$VALIDATION_EXIT" -ne 0 ]; then
            VALIDATION_STATUS="failed"
            POLICY_ERROR="$VALIDATION_OUTPUT"
          else
            VALIDATION_STATUS=$(printf '%s\n' "$VALIDATION_OUTPUT" | sed -n 's/^validation_status=//p' | tail -n 1)
            RELEASE_ENABLED=$(printf '%s\n' "$VALIDATION_OUTPUT" | sed -n 's/^release_enabled=//p' | tail -n 1)
            PRERELEASE=$(printf '%s\n' "$VALIDATION_OUTPUT" | sed -n 's/^prerelease=//p' | tail -n 1)
            RELEASE_TYPE=$(printf '%s\n' "$VALIDATION_OUTPUT" | sed -n 's/^release_type=//p' | tail -n 1)

            [ -z "$VALIDATION_STATUS" ] && VALIDATION_STATUS="failed"
            [ -z "$RELEASE_ENABLED" ] && RELEASE_ENABLED="false"
            [ -z "$PRERELEASE" ] && PRERELEASE="false"
            [ -z "$RELEASE_TYPE" ] && RELEASE_TYPE="none"

            if [ "$VALIDATION_STATUS" = "failed" ]; then
              POLICY_ERROR="$VALIDATION_OUTPUT"
            elif [ "$VALIDATION_STATUS" = "skipped" ]; then
              SKIP_REASON="当前分支 $BRANCH_NAME 不参与 CI 发布。"
            elif [ "$RELEASE_ENABLED" = "true" ]; then
              if [ "$SKIP_BY_COMMIT" = "true" ]; then
                SHOULD_TAG="false"
                SKIP_REASON="提交信息包含 [ci:skip-release]，已按指令跳过发布。"
              elif [ "$FORCE_BY_COMMIT" = "true" ]; then
                SHOULD_TAG="true"
              elif [ "$RELEASE_CHANNEL" = "alpha" ] || [ "$RELEASE_CHANNEL" = "beta" ]; then
                SHOULD_TAG="true"
              elif [ "$FORCE_RELEASE" = "true" ]; then
                SHOULD_TAG="true"
              else
                SHOULD_TAG="false"
                SKIP_REASON="当前版本 $CURRENT_VERSION（channel=$RELEASE_CHANNEL）默认不自动发布。仅 alpha/beta 自动发布；如需发布 stable/rc，请手动触发 workflow_dispatch 并设置 force_release=true。"
              fi
            fi
          fi

          if [ -z "$POLICY_ERROR" ] && [ "$RELEASE_ENABLED" = "true" ] && [ "$VALIDATION_STATUS" = "passed" ]; then
            if [ "$SHOULD_TAG" != "true" ]; then
              echo "[信息] 本次跳过打 tag 与发布：$SKIP_REASON"
              echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
              echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
              echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
              echo "release_enabled=$RELEASE_ENABLED" >> "$GITHUB_OUTPUT"
              echo "validation_status=$VALIDATION_STATUS" >> "$GITHUB_OUTPUT"
              echo "should_tag=$SHOULD_TAG" >> "$GITHUB_OUTPUT"
              echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
              echo "policy_error=$POLICY_ERROR" >> "$GITHUB_OUTPUT"
              echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
              echo "publish_tag_name=$PUBLISH_TAG_NAME" >> "$GITHUB_OUTPUT"
              echo "publish_tag_prefix=$PUBLISH_TAG_PREFIX" >> "$GITHUB_OUTPUT"
              echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
              echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
              echo "overwrite=${OVERWRITE:-false}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git fetch --tags
            TAG_EXISTS=false
            RELEASE_EXISTS=false
            git rev-parse "$TAG_NAME" >/dev/null 2>&1 && TAG_EXISTS=true
            gh release view "$TAG_NAME" >/dev/null 2>&1 && RELEASE_EXISTS=true
            if [ "$TAG_EXISTS" = "true" ] || [ "$RELEASE_EXISTS" = "true" ]; then
              SHOULD_TAG="true"
              OVERWRITE="true"
              PUBLISH_TAG_PREFIX="v"
              PUBLISH_TAG_NAME="v${RELEASE_VERSION}-$SHORT_SHA"
            else
              SHOULD_TAG="true"
              OVERWRITE="false"
            fi
          fi

          echo "[信息] 版本检查结果：branch=$BRANCH_NAME target_sha=$TARGET_SHA version=$CURRENT_VERSION validation_status=${VALIDATION_STATUS:-unknown} release_enabled=${RELEASE_ENABLED:-false} release_type=${RELEASE_TYPE:-none} prerelease=${PRERELEASE:-false} should_tag=${SHOULD_TAG:-false} force_by_commit=${FORCE_BY_COMMIT:-false} skip_by_commit=${SKIP_BY_COMMIT:-false} publish_tag=$PUBLISH_TAG_NAME overwrite=${OVERWRITE:-false}"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_enabled=$RELEASE_ENABLED" >> "$GITHUB_OUTPUT"
          echo "validation_status=$VALIDATION_STATUS" >> "$GITHUB_OUTPUT"
          echo "should_tag=$SHOULD_TAG" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
          echo "policy_error=$POLICY_ERROR" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "publish_tag_name=$PUBLISH_TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "publish_tag_prefix=$PUBLISH_TAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "overwrite=${OVERWRITE:-false}" >> "$GITHUB_OUTPUT"

      - name: Ensure publish tag points to current commit
        id: ensure_publish_tag
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.version_check.outputs.should_tag == 'true'
        env:
          PUBLISH_TAG_NAME: ${{ steps.version_check.outputs.publish_tag_name }}
          TARGET_SHA: ${{ steps.version_check.outputs.target_sha }}
        run: |
          echo "[信息] 正在为发布创建 git tag：$PUBLISH_TAG_NAME"

          git fetch --tags

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$PUBLISH_TAG_NAME" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-list -n 1 "$PUBLISH_TAG_NAME")"
            if [ "$EXISTING_SHA" = "$TARGET_SHA" ]; then
              echo "[信息] Tag 已存在且指向当前提交，复用现有 tag：$PUBLISH_TAG_NAME"
              echo "created=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "[信息] Tag 已存在但指向不同提交，将更新 tag：$PUBLISH_TAG_NAME $EXISTING_SHA -> $TARGET_SHA"
            git tag -f "$PUBLISH_TAG_NAME" "$TARGET_SHA"
            git push --force origin "refs/tags/$PUBLISH_TAG_NAME"
            echo "created=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "$PUBLISH_TAG_NAME" "$TARGET_SHA"
          git push origin "refs/tags/$PUBLISH_TAG_NAME"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Fail when branch version validation fails
        if: steps.version_check.outputs.policy_error != ''
        run: |
          echo "::error::版本校验失败：${{ steps.version_check.outputs.policy_error }}"
          echo "branch_name=${{ steps.version_check.outputs.branch_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "current_version=${{ steps.version_check.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "status=failed" >> "$GITHUB_STEP_SUMMARY"
          echo "reason=${{ steps.version_check.outputs.policy_error }}" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Create or update GitHub draft release
        id: create_draft_release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.ensure_publish_tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version_check.outputs.publish_tag_name }}
          name: ${{ steps.version_check.outputs.publish_tag_name }}
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.version_check.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.version_check.outputs.prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark draft release creation result
        id: mark_draft_release_created
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.ensure_publish_tag.outputs.created == 'true'
        run: |
          echo "[信息] 已为 tag ${{ steps.version_check.outputs.publish_tag_name }} 创建 GitHub 草稿 release"
          echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Report release planning summary
        if: always()
        run: |
          echo "branch_name=${{ steps.version_check.outputs.branch_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "current_version=${{ steps.version_check.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "release_version=${{ steps.version_check.outputs.release_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "tag_name=${{ steps.version_check.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "publish_tag_name=${{ steps.version_check.outputs.publish_tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "publish_tag_prefix=${{ steps.version_check.outputs.publish_tag_prefix }}" >> "$GITHUB_STEP_SUMMARY"
          echo "release_enabled=${{ steps.version_check.outputs.release_enabled }}" >> "$GITHUB_STEP_SUMMARY"
          echo "validation_status=${{ steps.version_check.outputs.validation_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "should_tag=${{ steps.version_check.outputs.should_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "overwrite=${{ steps.version_check.outputs.overwrite }}" >> "$GITHUB_STEP_SUMMARY"
          echo "prerelease=${{ steps.version_check.outputs.prerelease }}" >> "$GITHUB_STEP_SUMMARY"
          echo "release_type=${{ steps.version_check.outputs.release_type }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.version_check.outputs.policy_error }}" ]; then
            echo "policy_error=${{ steps.version_check.outputs.policy_error }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${{ steps.version_check.outputs.skip_reason }}" ]; then
            echo "skip_reason=${{ steps.version_check.outputs.skip_reason }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  build_release_artifacts:
    needs: [read_package_version, prepare_release_metadata]
    runs-on: ${{ matrix.os }}
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.prepare_release_metadata.outputs.released == 'true'
    timeout-minutes: 90
    concurrency:
      group: ${{ github.workflow }}-release-version-${{ needs.prepare_release_metadata.outputs.release_version }}-build_release_artifacts-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: true
    permissions: write-all

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare_release_metadata.outputs.target_sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install
        run: pnpm i

      - name: Clean build output
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }

      - name: Build release artifacts
        env:
          ELECTRON_BUILDER_RELEASE_BUILD: "true"
          ELECTRON_BUILDER_TAG_NAME_PREFIX: ${{ needs.prepare_release_metadata.outputs.publish_tag_prefix }}
          ELECTRON_BUILDER_ARTIFACT_COMMIT: ${{ needs.prepare_release_metadata.outputs.target_sha }}
          GITHUB_REF_NAME: ${{ needs.prepare_release_metadata.outputs.publish_tag_name }}
          GITHUB_REF: refs/tags/${{ needs.prepare_release_metadata.outputs.publish_tag_name }}
        run: |
          echo "[信息] 正在 $RUNNER_OS 上为 tag ${{ needs.prepare_release_metadata.outputs.publish_tag_name }} 构建发布产物"
          pnpm run build

      - name: Smoke test Windows packaged app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "[信息] 正在查找 Windows 安装包与 unpacked 可执行文件"

          $installer = Get-ChildItem build -File |
            Where-Object { $_.Extension -eq '.exe' -and $_.Name -notlike 'builder-*' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw '未找到 Windows 安装包。'
          }

          Write-Host "[信息] 已找到安装包: $($installer.Name)"

          $exe = Get-ChildItem build\\win-unpacked -Recurse -Filter 't2q.exe' -File -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $exe) {
            throw '未找到 build/win-unpacked/t2q.exe，无法执行 Windows 产物冒烟验证。'
          }

          Write-Host "[信息] 准备启动 unpacked 应用进行 smoke test: $($exe.FullName)"
          $appProcess = Start-Process -FilePath $exe.FullName -PassThru

          try {
            $expectedWindowTitle = 'Quick Ticket to Queue'
            $windowDetected = $false

            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              Start-Sleep -Seconds 2

              $runningProcess = Get-Process -Id $appProcess.Id -ErrorAction SilentlyContinue
              if (-not $runningProcess) {
                throw 'unpacked 应用在主窗口出现前已退出。'
              }

              if ($runningProcess.MainWindowTitle -like "*$expectedWindowTitle*") {
                $windowDetected = $true
                Write-Host "[信息] 已检测到主窗口标题: $($runningProcess.MainWindowTitle)"
                break
              }
            }

            if (-not $windowDetected) {
              $runningProcess = Get-Process -Id $appProcess.Id -ErrorAction SilentlyContinue
              $currentWindowTitle = if ($runningProcess) { $runningProcess.MainWindowTitle } else { '' }
              throw "未在预期时间内检测到主窗口标题。当前标题: $currentWindowTitle"
            }

            Write-Host '[信息] 应用主窗口已成功打开，通过 Windows 产物 smoke test。'
          }
          finally {
            $runningProcess = Get-Process -Id $appProcess.Id -ErrorAction SilentlyContinue
            if ($runningProcess) {
              Stop-Process -Id $appProcess.Id -Force
            }
          }

      - name: Upload build artifacts to draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TAG_NAME: ${{ needs.prepare_release_metadata.outputs.publish_tag_name }}
        run: |
          Write-Host "[信息] 正在收集 release $env:PUBLISH_TAG_NAME 的构建产物"

          $files = Get-ChildItem build -File |
            Where-Object { $_.Extension -in @('.exe', '.zip', '.AppImage', '.blockmap', '.yml') -and $_.Name -notlike 'builder-*' } |
            Select-Object -ExpandProperty FullName

          if ($files.Count -eq 0) {
            throw 'No build artifacts found to upload.'
          }

          Write-Host "[信息] 正在向草稿 release $env:PUBLISH_TAG_NAME 上传 $($files.Count) 个产物"

          gh release upload $env:PUBLISH_TAG_NAME @files --clobber

  publish_release:
    needs:
      [read_package_version, prepare_release_metadata, build_release_artifacts]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.prepare_release_metadata.outputs.released == 'true'
    concurrency:
      group: ${{ github.workflow }}-release-version-${{ needs.prepare_release_metadata.outputs.release_version }}-publish_release
      cancel-in-progress: true
    permissions:
      contents: write
    outputs:
      tag_transition_started: ${{ steps.publish_release_step.outputs.tag_transition_started }}
    steps:
      - name: Publish draft release to final release
        id: publish_release_step
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare_release_metadata.outputs.tag_name }}
          PUBLISH_TAG_NAME: ${{ needs.prepare_release_metadata.outputs.publish_tag_name }}
          PRERELEASE: ${{ needs.prepare_release_metadata.outputs.prerelease }}
          OVERWRITE: ${{ needs.prepare_release_metadata.outputs.overwrite }}
          TARGET_SHA: ${{ needs.prepare_release_metadata.outputs.target_sha }}
        run: |
          echo "[信息] 正在完成 release 发布：publish_tag=$PUBLISH_TAG_NAME final_tag=$TAG_NAME prerelease=$PRERELEASE overwrite=$OVERWRITE"

          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$PUBLISH_TAG_NAME\") | .id" | head -1)
          if [ -z "$RELEASE_ID" ]; then
            echo "Error: could not find release for tag $PUBLISH_TAG_NAME"
            exit 1
          fi

          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_BOOL=true
            MAKE_LATEST_VALUE=false
          else
            PRERELEASE_BOOL=false
            MAKE_LATEST_VALUE=true
          fi

          if [ "$OVERWRITE" = "true" ]; then
            OLD_RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$TAG_NAME\") | .id" | head -1 || true)
            echo "tag_transition_started=true" >> "$GITHUB_OUTPUT"
            echo "[信息] 已进入覆盖模式，准备替换已有正式 tag：$TAG_NAME"

            if [ -n "$OLD_RELEASE_ID" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$OLD_RELEASE_ID"
            fi

            gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG_NAME" 2>/dev/null || true
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$TAG_NAME" \
              -f sha="$TARGET_SHA"
          fi

          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F tag_name="$TAG_NAME" \
            -F name="$TAG_NAME" \
            -F draft=false \
            -F prerelease="$PRERELEASE_BOOL" \
            -F make_latest="$MAKE_LATEST_VALUE"

          # GitHub release fields may be briefly stale right after PATCH; retry to avoid false negatives.
          ATTEMPT=0
          MAX_ATTEMPTS=10
          IS_DRAFT="true"
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            IS_DRAFT=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '.draft | tostring')
            if [ "$IS_DRAFT" = "false" ]; then
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 2
          done

          if [ "$IS_DRAFT" != "false" ]; then
            echo "Error: release $RELEASE_ID is still draft after publish (attempts=$MAX_ATTEMPTS)"
            gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '{id, tag_name, draft, prerelease, published_at}'
            exit 1
          fi

          if [ "$PRERELEASE_BOOL" = "false" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F make_latest=true >/dev/null
            LATEST_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.id' 2>/dev/null || true)
            if [ "$LATEST_ID" != "$RELEASE_ID" ]; then
              echo "Error: release $RELEASE_ID was published but not marked latest (latest=$LATEST_ID)"
              exit 1
            fi
          fi

          echo "[信息] Release 发布完成：$TAG_NAME"

          if [ "$OVERWRITE" = "true" ] && [ "$PUBLISH_TAG_NAME" != "$TAG_NAME" ]; then
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$PUBLISH_TAG_NAME" 2>/dev/null || true
          fi

  cleanup_failed_release:
    needs:
      [
        read_package_version,
        prepare_release_metadata,
        build_release_artifacts,
        publish_release,
      ]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.prepare_release_metadata.outputs.publish_tag_name != '' && (needs.prepare_release_metadata.result != 'success' || needs.build_release_artifacts.result != 'success' || needs.publish_release.result != 'success')
    concurrency:
      group: ${{ github.workflow }}-release-version-${{ needs.prepare_release_metadata.outputs.release_version }}-cleanup_failed_release
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - name: Cleanup publish tag and release residue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare_release_metadata.outputs.tag_name }}
          PUBLISH_TAG_NAME: ${{ needs.prepare_release_metadata.outputs.publish_tag_name }}
          OVERWRITE: ${{ needs.prepare_release_metadata.outputs.overwrite }}
          TAG_TRANSITION_STARTED: ${{ needs.publish_release.outputs.tag_transition_started }}
        run: |
          echo "[信息] 已触发清理：publish_tag=$PUBLISH_TAG_NAME final_tag=$TAG_NAME overwrite=$OVERWRITE transition_started=$TAG_TRANSITION_STARTED"

          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$PUBLISH_TAG_NAME\") | .id" | head -1 || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" || true
            echo "Deleted release id=$RELEASE_ID"
          else
            echo "No release found for tag $PUBLISH_TAG_NAME"
          fi

          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$PUBLISH_TAG_NAME" 2>/dev/null || true
          echo "Deleted tag $PUBLISH_TAG_NAME (if existed)"

          if [ "$OVERWRITE" = "true" ] && [ "$TAG_TRANSITION_STARTED" = "true" ] && [ "$TAG_NAME" != "$PUBLISH_TAG_NAME" ]; then
            TAG_RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$TAG_NAME\") | .id" | head -1 || true)
            if [ -n "$TAG_RELEASE_ID" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$TAG_RELEASE_ID" || true
              echo "Deleted release for tag $TAG_NAME"
            else
              echo "No release found for tag $TAG_NAME"
            fi

            gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG_NAME" 2>/dev/null || true
            echo "Deleted tag $TAG_NAME (if existed)"
          fi
