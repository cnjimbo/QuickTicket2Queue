name: CI
# test
on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect_package_version:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.read_version.outputs.current_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read package version
        id: read_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

  auto_tag_release:
    needs: detect_package_version
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ needs.detect_package_version.outputs.current_version }}-auto_tag_release
      cancel-in-progress: true
    permissions:
      contents: write
    outputs:
      branch_name: ${{ steps.version_check.outputs.branch_name }}
      current_version: ${{ steps.version_check.outputs.current_version }}
      release_version: ${{ steps.version_check.outputs.release_version }}
      tag_name: ${{ steps.version_check.outputs.tag_name }}
      publish_tag_name: ${{ steps.version_check.outputs.publish_tag_name }}
      publish_tag_prefix: ${{ steps.version_check.outputs.publish_tag_prefix }}
      should_tag: ${{ steps.version_check.outputs.should_tag }}
      skip_reason: ${{ steps.version_check.outputs.skip_reason }}
      prerelease: ${{ steps.version_check.outputs.prerelease }}
      release_type: ${{ steps.version_check.outputs.release_type }}
      overwrite: ${{ steps.version_check.outputs.overwrite }}
      created: ${{ steps.create_tag.outputs.created }}
      released: ${{ steps.release_status.outputs.released }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect version increase
        id: version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_VERSION: ${{ needs.detect_package_version.outputs.current_version }}
        run: |
          echo "[信息] 正在根据 package.json 版本号和当前分支判断发布策略"

          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          RELEASE_VERSION="$CURRENT_VERSION"
          SKIP_REASON=""
          RELEASE_TYPE="release"
          TAG_NAME="v$RELEASE_VERSION"
          PUBLISH_TAG_NAME="$TAG_NAME"
          PUBLISH_TAG_PREFIX="v"
          SHORT_SHA="${GITHUB_SHA::7}"
          STABLE_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+$'
          PRE_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta)\.[0-9]+$'

          if [ "$BRANCH_NAME" = "main" ]; then
            if printf '%s' "$CURRENT_VERSION" | grep -Eq "$STABLE_PATTERN"; then
              PRERELEASE="false"
              RELEASE_TYPE="release"
            elif printf '%s' "$CURRENT_VERSION" | grep -Eq "$PRE_PATTERN"; then
              PRERELEASE="true"
              RELEASE_TYPE="prerelease"
            else
              PRERELEASE="false"
              SHOULD_TAG="false"
              SKIP_REASON="main 分支版本号不符合发布规则。仅接受 `x.y.z`、`x.y.z-alpha.N`、`x.y.z-beta.N` 三种格式。"
            fi
          else
            if printf '%s' "$CURRENT_VERSION" | grep -Eq "$PRE_PATTERN"; then
              PRERELEASE="true"
              RELEASE_TYPE="prerelease"
            else
              PRERELEASE="false"
              SHOULD_TAG="false"
              SKIP_REASON="非 main 分支仅允许发布 prerelease，版本号必须为 `x.y.z-alpha.N` 或 `x.y.z-beta.N`。"
            fi
          fi

          if [ -z "$SKIP_REASON" ]; then
            git fetch --tags
            TAG_EXISTS=false
            RELEASE_EXISTS=false
            git rev-parse "$TAG_NAME" >/dev/null 2>&1 && TAG_EXISTS=true
            gh release view "$TAG_NAME" >/dev/null 2>&1 && RELEASE_EXISTS=true
            if [ "$TAG_EXISTS" = "true" ] || [ "$RELEASE_EXISTS" = "true" ]; then
              SHOULD_TAG="true"
              OVERWRITE="true"
              PUBLISH_TAG_PREFIX="v"
              PUBLISH_TAG_NAME="v${RELEASE_VERSION}-$SHORT_SHA"
            else
              SHOULD_TAG="true"
              OVERWRITE="false"
            fi
          fi

          echo "[信息] 版本检查结果：branch=$BRANCH_NAME version=$CURRENT_VERSION release_type=${RELEASE_TYPE:-unknown} prerelease=${PRERELEASE:-unknown} should_tag=${SHOULD_TAG:-false} publish_tag=$PUBLISH_TAG_NAME overwrite=${OVERWRITE:-false}"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_tag=$SHOULD_TAG" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "publish_tag_name=$PUBLISH_TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "publish_tag_prefix=$PUBLISH_TAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "overwrite=${OVERWRITE:-false}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        id: create_tag
        if: github.event_name == 'push' && steps.version_check.outputs.should_tag == 'true'
        env:
          PUBLISH_TAG_NAME: ${{ steps.version_check.outputs.publish_tag_name }}
        run: |
          echo "[信息] 正在为发布创建 git tag：$PUBLISH_TAG_NAME"

          git fetch --tags

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$PUBLISH_TAG_NAME" "$GITHUB_SHA"
          git push origin "$PUBLISH_TAG_NAME"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub draft release
        id: create_release
        if: github.event_name == 'push' && steps.create_tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version_check.outputs.publish_tag_name }}
          name: ${{ steps.version_check.outputs.publish_tag_name }}
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.version_check.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.version_check.outputs.prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark release creation result
        id: release_status
        if: github.event_name == 'push' && steps.create_tag.outputs.created == 'true'
        run: |
          echo "[信息] 已为 tag ${{ steps.version_check.outputs.publish_tag_name }} 创建 GitHub 草稿 release"
          echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Report release decision
        if: always()
        run: |
          echo "branch_name=${{ steps.version_check.outputs.branch_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "current_version=${{ steps.version_check.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "release_version=${{ steps.version_check.outputs.release_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "tag_name=${{ steps.version_check.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "publish_tag_name=${{ steps.version_check.outputs.publish_tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "publish_tag_prefix=${{ steps.version_check.outputs.publish_tag_prefix }}" >> "$GITHUB_STEP_SUMMARY"
          echo "should_tag=${{ steps.version_check.outputs.should_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "overwrite=${{ steps.version_check.outputs.overwrite }}" >> "$GITHUB_STEP_SUMMARY"
          echo "prerelease=${{ steps.version_check.outputs.prerelease }}" >> "$GITHUB_STEP_SUMMARY"
          echo "release_type=${{ steps.version_check.outputs.release_type }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.version_check.outputs.skip_reason }}" ]; then
            echo "skip_reason=${{ steps.version_check.outputs.skip_reason }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  release:
    needs: [detect_package_version, auto_tag_release]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && needs.auto_tag_release.outputs.released == 'true'
    timeout-minutes: 90
    concurrency:
      group: ${{ github.workflow }}-${{ needs.detect_package_version.outputs.current_version }}-release-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: true
    permissions: write-all

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install
        run: pnpm i

      - name: Clean build output
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }

      - name: Build and publish
        env:
          ELECTRON_BUILDER_RELEASE_BUILD: "true"
          ELECTRON_BUILDER_TAG_NAME_PREFIX: ${{ needs.auto_tag_release.outputs.publish_tag_prefix }}
          ELECTRON_BUILDER_ARTIFACT_COMMIT: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ needs.auto_tag_release.outputs.publish_tag_name }}
          GITHUB_REF: refs/tags/${{ needs.auto_tag_release.outputs.publish_tag_name }}
        run: |
          echo "[信息] 正在 $RUNNER_OS 上为 tag ${{ needs.auto_tag_release.outputs.publish_tag_name }} 构建发布产物"
          pnpm run build

      - name: Upload build artifacts to draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TAG_NAME: ${{ needs.auto_tag_release.outputs.publish_tag_name }}
        run: |
          Write-Host "[信息] 正在收集 release $env:PUBLISH_TAG_NAME 的构建产物"

          $files = Get-ChildItem build -File |
            Where-Object { $_.Extension -in @('.exe', '.zip', '.AppImage', '.blockmap', '.yml') -and $_.Name -notlike 'builder-*' } |
            Select-Object -ExpandProperty FullName

          if ($files.Count -eq 0) {
            throw 'No build artifacts found to upload.'
          }

          Write-Host "[信息] 正在向草稿 release $env:PUBLISH_TAG_NAME 上传 $($files.Count) 个产物"

          gh release upload $env:PUBLISH_TAG_NAME @files --clobber

  finalize_release:
    needs: [detect_package_version, auto_tag_release, release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.auto_tag_release.outputs.released == 'true'
    concurrency:
      group: ${{ github.workflow }}-${{ needs.detect_package_version.outputs.current_version }}-finalize_release
      cancel-in-progress: true
    permissions:
      contents: write
    outputs:
      tag_transition_started: ${{ steps.publish_release.outputs.tag_transition_started }}
    steps:
      - name: Publish draft release
        id: publish_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.auto_tag_release.outputs.tag_name }}
          PUBLISH_TAG_NAME: ${{ needs.auto_tag_release.outputs.publish_tag_name }}
          PRERELEASE: ${{ needs.auto_tag_release.outputs.prerelease }}
          OVERWRITE: ${{ needs.auto_tag_release.outputs.overwrite }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          echo "[信息] 正在完成 release 发布：publish_tag=$PUBLISH_TAG_NAME final_tag=$TAG_NAME prerelease=$PRERELEASE overwrite=$OVERWRITE"

          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$PUBLISH_TAG_NAME\") | .id" | head -1)
          if [ -z "$RELEASE_ID" ]; then
            echo "Error: could not find release for tag $PUBLISH_TAG_NAME"
            exit 1
          fi

          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_BOOL=true
            MAKE_LATEST_VALUE=false
          else
            PRERELEASE_BOOL=false
            MAKE_LATEST_VALUE=true
          fi

          if [ "$OVERWRITE" = "true" ]; then
            OLD_RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$TAG_NAME\") | .id" | head -1 || true)
            echo "tag_transition_started=true" >> "$GITHUB_OUTPUT"
            echo "[信息] 已进入覆盖模式，准备替换已有正式 tag：$TAG_NAME"

            if [ -n "$OLD_RELEASE_ID" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$OLD_RELEASE_ID"
            fi

            gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG_NAME" 2>/dev/null || true
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$TAG_NAME" \
              -f sha="$TARGET_SHA"
          fi

          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F tag_name="$TAG_NAME" \
            -F name="$TAG_NAME" \
            -F draft=false \
            -F prerelease="$PRERELEASE_BOOL" \
            -F make_latest="$MAKE_LATEST_VALUE"

          IS_DRAFT=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '.draft')
          if [ "$IS_DRAFT" != "false" ]; then
            echo "Error: release $RELEASE_ID is still draft after publish"
            exit 1
          fi

          if [ "$PRERELEASE_BOOL" = "false" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F make_latest=true >/dev/null
            LATEST_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.id' 2>/dev/null || true)
            if [ "$LATEST_ID" != "$RELEASE_ID" ]; then
              echo "Error: release $RELEASE_ID was published but not marked latest (latest=$LATEST_ID)"
              exit 1
            fi
          fi

          echo "[信息] Release 发布完成：$TAG_NAME"

          if [ "$OVERWRITE" = "true" ] && [ "$PUBLISH_TAG_NAME" != "$TAG_NAME" ]; then
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$PUBLISH_TAG_NAME" 2>/dev/null || true
          fi

  cleanup_on_failure_or_cancel:
    needs: [detect_package_version, auto_tag_release, release, finalize_release]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && needs.auto_tag_release.outputs.publish_tag_name != '' && (needs.auto_tag_release.result != 'success' || needs.release.result != 'success' || needs.finalize_release.result != 'success')
    concurrency:
      group: ${{ github.workflow }}-${{ needs.detect_package_version.outputs.current_version }}-cleanup_on_failure_or_cancel
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - name: Cleanup publish tag and release residue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.auto_tag_release.outputs.tag_name }}
          PUBLISH_TAG_NAME: ${{ needs.auto_tag_release.outputs.publish_tag_name }}
          OVERWRITE: ${{ needs.auto_tag_release.outputs.overwrite }}
          TAG_TRANSITION_STARTED: ${{ needs.finalize_release.outputs.tag_transition_started }}
        run: |
          echo "[信息] 已触发清理：publish_tag=$PUBLISH_TAG_NAME final_tag=$TAG_NAME overwrite=$OVERWRITE transition_started=$TAG_TRANSITION_STARTED"

          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$PUBLISH_TAG_NAME\") | .id" | head -1 || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" || true
            echo "Deleted release id=$RELEASE_ID"
          else
            echo "No release found for tag $PUBLISH_TAG_NAME"
          fi

          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$PUBLISH_TAG_NAME" 2>/dev/null || true
          echo "Deleted tag $PUBLISH_TAG_NAME (if existed)"

          if [ "$OVERWRITE" = "true" ] && [ "$TAG_TRANSITION_STARTED" = "true" ] && [ "$TAG_NAME" != "$PUBLISH_TAG_NAME" ]; then
            TAG_RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq ".[] | select(.tag_name == \"$TAG_NAME\") | .id" | head -1 || true)
            if [ -n "$TAG_RELEASE_ID" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$TAG_RELEASE_ID" || true
              echo "Deleted release for tag $TAG_NAME"
            else
              echo "No release found for tag $TAG_NAME"
            fi

            gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG_NAME" 2>/dev/null || true
            echo "Deleted tag $TAG_NAME (if existed)"
          fi
