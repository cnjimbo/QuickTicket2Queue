name: "🐛 Bug 报告"
description: "反馈应用中的 bug 或异常行为"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你向我们报告 bug！你的反馈帮助我们不断改进。请提供尽可能详细的信息。

  - type: textarea
    id: bug_description
    attributes:
      label: "🐛 Bug 描述"
      description: "简洁地说明遇到的问题"
      placeholder: |
        例如：工单提交后没有显示成功提示，但工单实际已创建
      rows: 3
    validations:
      required: true

  - type: textarea
    id: reproduce_steps
    attributes:
      label: "🔄 复现步骤"
      description: "提供精确的步骤来复现这个 bug"
      placeholder: |
        1. 打开应用，进入【工单提交】页面
        2. 选择环境为 pfeprod
        3. 填写标题、内容和指定队列
        4. 点击【提交工单】
        5. 等待 3-5 秒后...
      rows: 6
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "✅ 期望行为"
      description: "应该发生什么？"
      placeholder: |
        应该显示【提交成功】的消息，并在历史记录中添加该工单
      rows: 3
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "❌ 实际行为"
      description: "实际发生了什么？"
      placeholder: |
        页面没有任何提示，但查看历史记录发现工单确实已创建
      rows: 3
    validations:
      required: true

  - type: dropdown
    id: affected_modules
    attributes:
      label: "📍 涉及的功能模块"
      description: "bug 涉及哪个模块"
      multiple: true
      options:
        - "凭据管理"
        - "队列配置"
        - "工单提交"
        - "工单历史"
        - "环境切换"
        - "UI 界面"
        - "其他"
    validations:
      required: true

  - type: dropdown
    id: env_specific
    attributes:
      label: "🌍 是否影响特定 ServiceNow 环境"
      description: "bug 是否只在特定环境出现"
      options:
        - "所有环境"
        - "仅 pfetst（测试环境）"
        - "仅 pfestg（预发环境）"
        - "仅 pfeprod（生产环境）"
        - "不确定"
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "⏱️ 多久出现一次"
      description: "bug 出现的频率"
      options:
        - "首次出现"
        - "每次都能复现"
        - "大多数时候"
        - "偶尔出现"
        - "不确定"
    validations:
      required: true

  - type: textarea
    id: error_logs
    attributes:
      label: "📸 截图或错误日志（可选）"
      description: |
        粘贴应用错误提示、控制台错误或日志信息
        打开 F12 开发者工具（Console 标签）可以查看错误
      placeholder: |
        例如：
        Error: [IPC] Failed to invoke 'ticket': Invalid response format

        或者描述错误信息的内容
      rows: 5

  - type: input
    id: app_version
    attributes:
      label: "🖥️ 应用版本"
      description: "应用的版本号，可以在关于页面或 Help 菜单查看"
      placeholder: "0.0.5"
    validations:
      required: true

  - type: dropdown
    id: windows_version
    attributes:
      label: "🪟 Windows 版本"
      description: "你使用的 Windows 版本"
      options:
        - "Windows 10"
        - "Windows 11"
        - "其他"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: "Node.js 版本（如从源码运行）"
      description: "如果你是从源码运行开发版本，请提供 Node.js 版本（运行 node -v）"
      placeholder: "v22.0.0"

  - type: textarea
    id: workaround
    attributes:
      label: "🔧 临时解决方案（可选）"
      description: "你找到了什么临时的解决方法吗？"
      placeholder: |
        例如：重启应用后就正常了，或者切换到其他环境再切回来就可以了
      rows: 2

  - type: checkboxes
    id: checklist
    attributes:
      label: "✅ 检查清单"
      description: "请确保你已经完成以下检查"
      options:
        - label: "我已经搜索了现有 Issue，确认没有重复报告"
        - label: "我提供了清晰的复现步骤"
        - label: "我提供了环境信息（版本号和 Windows 版本）"
        - label: "我已经尝试过重启应用（如适用）"
